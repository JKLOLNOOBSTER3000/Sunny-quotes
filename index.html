<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Moment</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #d4a574;
    --accent-glow: rgba(212, 165, 116, 0.15);
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  /* Ambient glow */
  .glow {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: var(--accent-glow);
    filter: blur(120px);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    pointer-events: none;
    opacity: 0.6;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
    padding: 2rem;
    max-width: 640px;
    width: 100%;
    animation: fadeIn 1.2s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .image-frame {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 20px 60px rgba(0,0,0,0.5),
      0 0 80px var(--accent-glow);
    max-width: 100%;
  }

  .image-frame img {
    display: block;
    max-width: 100%;
    max-height: 60vh;
    object-fit: contain;
  }

  .quote-block {
    text-align: center;
    max-width: 520px;
    animation: fadeIn 1.2s ease-out 0.3s both;
  }

  .quote-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    line-height: 1.7;
    font-weight: 400;
    font-style: italic;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .quote-text::before { content: '\201C'; color: var(--accent); }
  .quote-text::after { content: '\201D'; color: var(--accent); }

  .date-label {
    margin-top: 2.5rem;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    animation: fadeIn 1.2s ease-out 0.6s both;
  }

  @media (max-width: 480px) {
    .quote-text { font-size: 1.1rem; }
    .container { gap: 1.8rem; }
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="container">
  <div class="image-frame">
    <img id="daily-gif" alt="Daily image" />
  </div>
  <div class="quote-block">
    <p class="quote-text" id="daily-quote"></p>
  </div>
  <div class="date-label" id="date-label"></div>
</div>

<script>
// ============================================================
// CONFIGURATION — Edit these to customize your site
// ============================================================

// GIF URLs — Replace these with your own GIF URLs or file paths
const GIFS = {
  primary: "https://media1.tenor.com/m/q3piKTP5szQAAAAC/sun-roll.gif",   // 90% chance — REPLACE with your GIF 1
  rare: [
    "https://media1.tenor.com/m/iYT_wH0TZ9EAAAAC/sun-sun-flares.gif",   // GIF 2 — 2% chance
    "https://media1.tenor.com/m/b1uqnsOfJ2AAAAAd/sun-sun-rays.gif",   // GIF 3 — 2% chance
    "https://media1.tenor.com/m/emT1_4_J3L4AAAAC/fire-world.gif",   // GIF 4 — 2% chance
    "https://media1.tenor.com/m/ucp9cSGNT0UAAAAd/exploding-star-trek-picard.gif",   // GIF 5 — 2% chance
    "https://media1.tenor.com/m/_bbChuywxYsAAAAd/%D0%BF%D0%BB%D0%B0%D0%BD%D0%B5%D1%82%D0%B0-explosion.gif",   // GIF 6 — 2% chance
  ]
};

// 365 QUOTES — Replace/add your own. Fill all 365 slots for a full year cycle.
const QUOTES = [
  "I think we are just insects, we live a bit and then die and that’s the lot. There’s no mercy in things. There’s not even a Great Beyond. There’s nothing.",
  "The point is, there is no feasible excuse for what are, for what we have made of ourselves. We have chosen to put profits before people, money before morality, dividends before decency, fanaticism before fairness, and our own trivial comforts before the unspeakable agonies of others.",
  "Life is possible only by the deficiencies of our imagination and our memory.",
  "There is no other world. Nor even this one. What, then, is there? The inner smile provoked in us by the patent nonexistence of both.",
  "Destroy or be destroyed-there is no middle way! Let us then be the destroyers!",
  "Do you know what punishments I've endured for my crimes, my sins? None. I am proof of the absurdity of men's most treasured abstractions. A just universe wouldn't tolerate my existence.",
  "If God really existed, it would be necessary to abolish Him.",
  "Like other lifeforms, we humans exist only to replicate ourselves.",
  "No system has ever as yet existed which did not in some form involve the exploitation of some human beings for the advantage of others.",
  "Show me a population that is deeply religious and I will show you a servile population, content with whips and chains, ... content to eat the bread of sorrow and drink the waters of affliction.",
  "Sometimes people don't want to hear the truth because they don't want their illusions destroyed.",
  "When we are tired, we are attacked by ideas we conquered long ago.",
  "I cannot believe in a God who wants to be praised all the time.",
  "In individuals, insanity is rare; but in groups, parties, nations and epochs, it is the rule.",
  "Is man merely a mistake of God's? Or God merely a mistake of man?",
  "Man is the cruelest animal.",
  "Thoughts are the shadows of our feelings -- always darker, emptier and simpler.",
  "... for when you gaze long into the abyss. The abyss gazes also into you.",
  "There are no beautiful surfaces without a terrible depth.",
  "God is dead. God remains dead. And we have killed him. ",
  "Distrustful of my own faculties… I embrace doubt itself as truth… affirming nothing, and doubting all things…",
  "You were not there for The Beginning. You will not be there for The End…. Your knowledge of what is going on can only be superficial and relative…",
  "All that you see will soon perish; those who witness this perishing will soon perish themselves. Die in extreme old age or die before your time – it will all be the same.",
  "All is dark, all is dreadful, and I do not see any special reason for my lingering in the dark, vainly invented world.",
  "Rather, I think the sight confirmed what he already knew: that the edges of the world and everything in it are blurred by mystery and sadness.",
  "I felt I was myself a crawling insect doomed to perish, seized by destruction in the midst of a whole world ready to go to sleep",
  "Whenever someone tells me he dreamed, I wonder if he realizes that he has never done anything but dream..",

  // ——— Continue adding quotes to reach 365 ———
];

// ============================================================
// ENGINE — Deterministic daily selection (no backend needed)
// ============================================================

// Seeded PRNG (mulberry32)
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Get day number since epoch (UTC-based so everyone shares the same "day")
function getDayNumber() {
  const now = new Date();
  return Math.floor(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()) / 86400000);
}

// Deterministic shuffle using Fisher-Yates with seeded RNG
function seededShuffle(arr, seed) {
  const rng = mulberry32(seed);
  const shuffled = [...arr];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

// Pick today's GIF (90% primary, 2% each for 5 rare ones)
function getDailyGif(dayNum) {
  const rng = mulberry32(dayNum * 7919); // unique seed for gif selection
  const roll = rng() * 100;

  if (roll < 90) return GIFS.primary;
  // 90-91.99 = gif2, 92-93.99 = gif3, etc.
  const rareIndex = Math.floor((roll - 90) / 2);
  return GIFS.rare[Math.min(rareIndex, GIFS.rare.length - 1)];
}

// Pick today's quote — cycles through all quotes before repeating
function getDailyQuote(dayNum) {
  const totalQuotes = QUOTES.length;
  const cycleLength = totalQuotes;
  const cycleNumber = Math.floor(dayNum / cycleLength);
  const dayInCycle = dayNum % cycleLength;

  // Shuffle all quotes deterministically per cycle
  const shuffled = seededShuffle(QUOTES, cycleNumber + 42);
  return shuffled[dayInCycle];
}

// Format today's date
function formatDate() {
  const d = new Date();
  return d.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
    timeZone: 'UTC'
  });
}

// ============================================================
// INIT
// ============================================================
const dayNum = getDayNumber();

document.getElementById('daily-gif').src = getDailyGif(dayNum);
document.getElementById('daily-quote').textContent = getDailyQuote(dayNum);
document.getElementById('date-label').textContent = formatDate();
</script>
</body>
</html>
