<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Moment</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #d4a574;
    --accent-glow: rgba(212, 165, 116, 0.15);
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  /* Ambient glow */
  .glow {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: var(--accent-glow);
    filter: blur(120px);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    pointer-events: none;
    opacity: 0.6;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
    padding: 2rem;
    max-width: 640px;
    width: 100%;
    animation: fadeIn 1.2s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .image-frame {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 20px 60px rgba(0,0,0,0.5),
      0 0 80px var(--accent-glow);
    max-width: 100%;
  }

  .image-frame img {
    display: block;
    max-width: 100%;
    max-height: 60vh;
    object-fit: contain;
  }

  .quote-block {
    text-align: center;
    max-width: 520px;
    animation: fadeIn 1.2s ease-out 0.3s both;
  }

  .quote-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    line-height: 1.7;
    font-weight: 400;
    font-style: italic;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .quote-text::before { content: '\201C'; color: var(--accent); }
  .quote-text::after { content: '\201D'; color: var(--accent); }

  .date-label {
    margin-top: 2.5rem;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    animation: fadeIn 1.2s ease-out 0.6s both;
  }

  @media (max-width: 480px) {
    .quote-text { font-size: 1.1rem; }
    .container { gap: 1.8rem; }
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="container">
  <div class="image-frame">
    <img id="daily-gif" alt="Daily image" />
  </div>
  <div class="quote-block">
    <p class="quote-text" id="daily-quote"></p>
  </div>
  <div class="date-label" id="date-label"></div>
</div>

<script>

    "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExcnBhdGN4eWh4dWRkNmpqaHZuM3I5NjV3MnJuaGRndmdmNW1hbXMyNiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/xT0xeJpnrWC3XWblEk/giphy.gif",   // GIF 4 — 2% chance
    "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2pjZjFhb3h6NjF0dGIxd2syZGsxdW5oMGlmeW1jODB4NjJrNjdveSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3oEjI6SIIHBdRxXI40/giphy.gif",   // GIF 5 — 2% chance
    "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExcjMyNjF2a2Nxb2RqcDBhNGdqNTdqZnU1NXBuYng2d21mZnQybHI2biZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l0HlBO7eyXzSZkJri/giphy.gif",   // GIF 6 — 2% chance

// 365 QUOTES — Replace/add your own. Fill all 365 slots for a full year cycle.
const QUOTES = [

// ============================================================
// ENGINE — Deterministic daily selection (no backend needed)
// ============================================================

// Seeded PRNG (mulberry32)
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Get day number since epoch (UTC-based so everyone shares the same "day")
function getDayNumber() {
  const now = new Date();
  return Math.floor(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()) / 86400000);
}

// Deterministic shuffle using Fisher-Yates with seeded RNG
function seededShuffle(arr, seed) {
  const rng = mulberry32(seed);
  const shuffled = [...arr];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

// Pick today's GIF (90% primary, 2% each for 5 rare ones)
function getDailyGif(dayNum) {
  const rng = mulberry32(dayNum * 7919); // unique seed for gif selection
  const roll = rng() * 100;

  if (roll < 90) return GIFS.primary;
  // 90-91.99 = gif2, 92-93.99 = gif3, etc.
  const rareIndex = Math.floor((roll - 90) / 2);
  return GIFS.rare[Math.min(rareIndex, GIFS.rare.length - 1)];
}

// Pick today's quote — cycles through all quotes before repeating
function getDailyQuote(dayNum) {
  const totalQuotes = QUOTES.length;
  const cycleLength = totalQuotes;
  const cycleNumber = Math.floor(dayNum / cycleLength);
  const dayInCycle = dayNum % cycleLength;

  // Shuffle all quotes deterministically per cycle
  const shuffled = seededShuffle(QUOTES, cycleNumber + 42);
  return shuffled[dayInCycle];
}

// Format today's date
function formatDate() {
  const d = new Date();
  return d.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
    timeZone: 'UTC'
  });
}

// ============================================================
// INIT
// ============================================================
const dayNum = getDayNumber();

document.getElementById('daily-gif').src = getDailyGif(dayNum);
document.getElementById('daily-quote').textContent = getDailyQuote(dayNum);
document.getElementById('date-label').textContent = formatDate();
</script>
